name = "siteproof-mcp"
main = "src/index.ts"
compatibility_date = "2025-09-15"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "mcp.deveras.no", custom_domain = true }
]

[observability]
enabled = true

[[durable_objects.bindings]]
name = "SiteProofMCP"
class_name = "SiteProofMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SiteProofMCP"]
